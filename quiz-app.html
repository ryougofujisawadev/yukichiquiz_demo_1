<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#6366f1">
  <title>福沢諭吉クイズ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --success: #22c55e;
      --danger: #ef4444;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    /* ===== SCREEN BASE ===== */
    .screen { display: none; animation: fadeIn 0.3s ease; }
    .screen.active { display: flex; flex-direction: column; gap: 20px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    /* ===== CATEGORY GRID ===== */
    .categories {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .category-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .category-btn.selected {
      border-color: var(--primary);
      background: #eef2ff;
    }
    .category-btn:hover, .category-btn:active {
      border-color: var(--primary);
      background: #eef2ff;
      transform: scale(0.97);
    }
    .category-btn .emoji { font-size: 32px; }

    /* ===== DIFFICULTY ===== */
    .difficulty-row {
      display: flex;
      gap: 8px;
    }
    .diff-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
    }
    .diff-btn.selected { border-color: var(--primary); background: #eef2ff; color: var(--primary); }

    /* ===== BUTTONS ===== */
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), #8b5cf6); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn-success { background: var(--success); color: white; }

    /* ===== PROGRESS ===== */
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #8b5cf6);
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* ===== QUESTION ===== */
    .question-text {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== OPTIONS ===== */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      text-align: left;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option-btn:not(:disabled):hover { border-color: var(--primary); background: #eef2ff; }
    .option-btn:not(:disabled):active { transform: scale(0.98); }
    .option-btn.correct { border-color: var(--success); background: #f0fdf4; color: #166534; }
    .option-btn.wrong { border-color: var(--danger); background: #fef2f2; color: #991b1b; }
    .option-label {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.25s;
    }
    .option-btn.correct .option-label { background: var(--success); color: white; }
    .option-btn.wrong .option-label { background: var(--danger); color: white; }

    /* ===== FEEDBACK ===== */
    .feedback {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      display: none;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.5;
    }
    .feedback.show { display: flex; animation: fadeIn 0.2s ease; }
    .feedback.correct-fb { background: #f0fdf4; color: #166534; }
    .feedback.wrong-fb { background: #fef2f2; color: #991b1b; }
    .feedback-icon { font-size: 20px; flex-shrink: 0; }

    /* ===== TIMER ===== */
    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .timer-num {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary);
      min-width: 28px;
      text-align: center;
    }
    .timer-num.urgent { color: var(--danger); }

    /* ===== RESULT ===== */
    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      color: white;
      box-shadow: 0 8px 32px rgba(99,102,241,.35);
    }
    .score-num { font-size: 40px; font-weight: 900; line-height: 1; }
    .score-label { font-size: 12px; opacity: 0.85; }
    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .stat {
      text-align: center;
      padding: 14px 8px;
      background: var(--bg);
      border-radius: 12px;
    }
    .stat-val { font-size: 22px; font-weight: 800; }
    .stat-key { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .stat-val.green { color: var(--success); }
    .stat-val.red { color: var(--danger); }
    .rank-msg { text-align: center; font-size: 22px; font-weight: 800; }
    .rank-sub { text-align: center; font-size: 14px; color: var(--muted); }

    /* ===== COUPON ===== */
    .coupon {
      background: linear-gradient(135deg, #fff7ed, #fef3c7);
      border: 2.5px dashed #f59e0b;
      border-radius: var(--radius);
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
    }
    .coupon::before, .coupon::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--bg);
    }
    .coupon::before { left: -11px; }
    .coupon::after  { right: -11px; }
    .coupon-rank { font-size: 11px; font-weight: 800; color: #b45309; letter-spacing: .06em; margin-bottom: 2px; }
    .coupon-discount { font-size: 52px; font-weight: 900; color: #d97706; line-height: 1.1; margin-bottom: 4px; }
    .coupon-desc { font-size: 13px; color: var(--muted); }
    .coupon-code-row { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
    .coupon-code {
      flex: 1; padding: 10px 14px;
      background: white; border: 1.5px solid #fcd34d;
      border-radius: 10px; font-size: 15px; font-weight: 800;
      font-family: 'Courier New', monospace; color: var(--text); letter-spacing: .06em;
    }
    .copy-btn {
      padding: 10px 16px; background: #f59e0b; color: white;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: all .2s;
    }
    .copy-btn:active { transform: scale(.95); }
    .coupon-expiry { font-size: 11px; color: #92400e; opacity: .7; margin-top: 8px; }
    /* SS / S ランク：紫 */
    .coupon-ss { background: linear-gradient(135deg, #fdf4ff, #fae8ff); border-color: #c026d3; }
    .coupon-ss .coupon-rank    { color: #86198f; }
    .coupon-ss .coupon-discount{ color: #a21caf; }
    .coupon-ss .coupon-code    { border-color: #e879f9; }
    .coupon-ss .copy-btn       { background: #c026d3; }
    .coupon-ss .coupon-expiry  { color: #701a75; }
    /* A ランク：ゴールド */
    .coupon-a { background: linear-gradient(135deg, #fffbeb, #fef9c3); border-color: #eab308; }
    .coupon-a .coupon-rank    { color: #713f12; }
    .coupon-a .coupon-discount{ color: #ca8a04; }
    .coupon-a .coupon-code    { border-color: #fde047; }
    .coupon-a .copy-btn       { background: #ca8a04; }
  </style>
</head>
<body>
<div class="app">

  <!-- ===== START SCREEN ===== -->
  <div class="screen active" id="start-screen">
    <div class="card header">
      <div class="logo">📜</div>
      <h1>福沢諭吉クイズ</h1>
      <p>近代日本の巨人を知り尽くせ！全10問に挑戦</p>
    </div>

    <div class="card">
      <p style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em">カテゴリを選ぶ</p>
      <div class="categories">
        <button class="category-btn selected" data-category="life" onclick="selectCategory(this)">
          <span class="emoji">🎓</span>生涯
        </button>
        <button class="category-btn" data-category="works" onclick="selectCategory(this)">
          <span class="emoji">📚</span>著作
        </button>
        <button class="category-btn" data-category="thought" onclick="selectCategory(this)">
          <span class="emoji">💡</span>思想
        </button>
        <button class="category-btn" data-category="legacy" onclick="selectCategory(this)">
          <span class="emoji">🏛️</span>業績
        </button>
      </div>
    </div>

    <div class="card">
      <p style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em">難易度</p>
      <div class="difficulty-row">
        <button class="diff-btn selected" data-diff="easy" onclick="selectDiff(this)">かんたん</button>
        <button class="diff-btn" data-diff="medium" onclick="selectDiff(this)">ふつう</button>
        <button class="diff-btn" data-diff="hard" onclick="selectDiff(this)">むずかしい</button>
      </div>
    </div>

    <button class="btn btn-primary" onclick="startQuiz()">
      <span>クイズをはじめる</span> <span>→</span>
    </button>
  </div>

  <!-- ===== QUIZ SCREEN ===== -->
  <div class="screen" id="quiz-screen">
    <div class="card" style="padding:16px 20px">
      <div class="progress-header">
        <span id="q-counter">問題 1 / 10</span>
        <div class="timer-wrap">
          <span>⏱</span>
          <span class="timer-num" id="timer">20</span>
          <span>秒</span>
        </div>
      </div>
      <div class="progress-bar" style="margin-top:10px">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="card">
      <div class="question-text" id="question-text">Loading...</div>
    </div>

    <div class="options" id="options-list"></div>

    <div class="feedback" id="feedback">
      <span class="feedback-icon" id="feedback-icon"></span>
      <span id="feedback-text"></span>
    </div>

    <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">
      次の問題 →
    </button>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div class="screen" id="result-screen">
    <div class="card header">
      <div class="logo" id="result-emoji">🎉</div>
      <div class="rank-msg" id="rank-msg"></div>
      <div class="rank-sub" id="rank-sub"></div>
    </div>

    <div class="card">
      <div class="score-circle">
        <div class="score-num" id="score-num">0</div>
        <div class="score-label">点 / 100点</div>
      </div>
    </div>

    <div class="card">
      <div class="result-stats">
        <div class="stat">
          <div class="stat-val green" id="correct-count">0</div>
          <div class="stat-key">正解</div>
        </div>
        <div class="stat">
          <div class="stat-val red" id="wrong-count">0</div>
          <div class="stat-key">不正解</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="time-count">0</div>
          <div class="stat-key">総時間(秒)</div>
        </div>
      </div>
    </div>

    <div class="card">
      <p style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px">🎫 獲得クーポン</p>
      <div class="coupon" id="coupon-inner">
        <div class="coupon-rank" id="coupon-rank"></div>
        <div class="coupon-discount" id="coupon-discount"></div>
        <div class="coupon-desc" id="coupon-desc"></div>
        <div class="coupon-code-row">
          <div class="coupon-code" id="coupon-code"></div>
          <button class="copy-btn" id="copy-btn" onclick="copyCoupon()">コピー</button>
        </div>
        <div class="coupon-expiry" id="coupon-expiry"></div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="restart()">もう一度挑戦</button>
    <button class="btn btn-outline" onclick="showStart()">カテゴリを変える</button>
  </div>

</div>

<script>
// ===== QUESTIONS DATABASE =====
const QUESTIONS = {
  life: {
    easy: [
      { q: "福沢諭吉が生まれた年は？", opts: ["1825年","1835年","1845年","1855年"], ans: 1, exp: "天保5年（1835年）12月12日、大坂堂島浜（現・大阪市）に生まれました。" },
      { q: "福沢諭吉が設立した学校は？", opts: ["東京大学","早稲田大学","慶應義塾","同志社"], ans: 2, exp: "1858年に江戸・築地で蘭学塾として創設し、後に慶應義塾大学へ発展しました。" },
      { q: "福沢諭吉が生まれた藩は？", opts: ["薩摩藩","長州藩","中津藩","土佐藩"], ans: 2, exp: "現在の大分県中津市に当たる中津藩（奥平家）の出身です。" },
      { q: "福沢諭吉の顔が描かれていたお札は？", opts: ["千円札","五千円札","一万円札","五百円玉"], ans: 2, exp: "1984年から2024年まで一万円紙幣の肖像として使用されました。" },
      { q: "福沢諭吉が蘭学を本格的に学んだ都市は？", opts: ["江戸","長崎","大阪","京都"], ans: 2, exp: "大阪にある緒方洪庵の「適塾」で蘭学を学び、後に塾頭を務めました。" },
      { q: "福沢諭吉が幕府使節団として初めて渡航した国は？", opts: ["イギリス","フランス","アメリカ","オランダ"], ans: 2, exp: "1860年、咸臨丸に乗り込み初めてアメリカへ渡航しました。" },
      { q: "福沢諭吉が創刊した新聞は？", opts: ["朝日新聞","読売新聞","時事新報","毎日新聞"], ans: 2, exp: "1882年に時事新報を創刊し、明治時代の世論形成に大きな影響を与えました。" },
      { q: "福沢諭吉が亡くなった年は？", opts: ["1891年","1895年","1901年","1905年"], ans: 2, exp: "明治34年（1901年）2月3日に脳出血のため68歳で亡くなりました。" },
      { q: "福沢諭吉の自伝の題名は？", opts: ["学問自伝","福翁自伝","諭吉一代記","明治の回想"], ans: 1, exp: "「福翁自伝」（1899年）は口述筆記による自伝で、生涯を生き生きと描いています。" },
      { q: "緒方洪庵が大阪で開いた塾の名前は？", opts: ["鳴滝塾","咸宜園","適塾","松下村塾"], ans: 2, exp: "大阪・北区に現存する「適塾」で、福沢はここで蘭学を修め塾頭となりました。" },
    ],
    medium: [
      { q: "福沢諭吉が欧米に渡った回数は？", opts: ["1回","2回","3回","4回"], ans: 2, exp: "1860年（米）・1861〜62年（欧米）・1867年（米）の計3回渡航しました。" },
      { q: "福沢諭吉が初めて英語を学ぶきっかけは？", opts: ["米国人と友人になった","横浜で蘭語が通じなかった","幕府に命じられた","父から英書を渡された"], ans: 1, exp: "開港後の横浜を訪れた際、西洋人と蘭語で話せず英語の必要性を痛感し独学を始めました。" },
      { q: "福沢諭吉の父・百助の職業は？", opts: ["商人","藩士（武士）","農民","医者"], ans: 1, exp: "父・福沢百助は中津藩の下級藩士で、漢学に通じた人物でした。" },
      { q: "福沢諭吉が1860年に渡米した際に乗った船は？", opts: ["黒船","咸臨丸","開陽丸","千歳丸"], ans: 1, exp: "幕府の軍艦・咸臨丸に随行員として乗り込み、太平洋を横断してサンフランシスコに到着しました。" },
      { q: "福沢諭吉が明治政府への仕官を断り続けた理由は？", opts: ["給料が低かった","民間での独立を重んじたから","体調が優れなかった","家族に反対された"], ans: 1, exp: "「独立自尊」の精神から、政府に依存せず民間の立場で日本を啓蒙する道を貫きました。" },
      { q: "慶應義塾が東京・三田に移転したのはいつ？", opts: ["1868年","1871年","1873年","1880年"], ans: 2, exp: "明治6年（1873年）に現在の港区三田に移転し、大学の基盤を固めました。" },
      { q: "「脱亜論」が発表された媒体は？", opts: ["学問のすゝめ","時事新報","文明論之概略","福翁自伝"], ans: 1, exp: "1885年3月16日付の時事新報に社説として掲載されました。" },
      { q: "福沢諭吉の第二回渡航（1861〜62年）の主な訪問先は？", opts: ["アメリカのみ","ヨーロッパ各国","中国・朝鮮","インド・東南アジア"], ans: 1, exp: "幕府の欧州使節団に通訳として同行し、フランス・イギリス・オランダ等を視察しました。" },
      { q: "福沢諭吉が故郷・中津に設立した学校は？", opts: ["中津英学校","慶應義塾中津分校","中津藩校","諭吉塾"], ans: 0, exp: "1871年に故郷・中津に英学校（後に慶應義塾中津分校の前身）を設立しました。" },
      { q: "適塾で福沢が担った役職は？", opts: ["塾頭","副塾長","一般塾生","教務主任"], ans: 0, exp: "福沢は頭角を現し、在塾中に塾頭（最上位の塾生リーダー）を務めました。" },

// ===== STATE =====
let state = {
  category: 'life',
  difficulty: 'easy',
  questions: [],
  current: 0,
  score: 0,
  correct: 0,
  answered: false,
  timerVal: 20,
  timerInterval: null,
  startTime: 0,
  totalTime: 0,
};

const TIMER_LIMIT = { easy: 20, medium: 15, hard: 12 };
const LABELS = ['A', 'B', 'C', 'D'];

// ===== UI HELPERS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectCategory(el) {
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.category = el.dataset.category;
}

function selectDiff(el) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.difficulty = el.dataset.diff;
}

// ===== QUIZ LOGIC =====
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  const pool = QUESTIONS[state.category][state.difficulty];
  state.questions = shuffle([...pool]).slice(0, 10);
  state.current = 0;
  state.score = 0;
  state.correct = 0;
  state.startTime = Date.now();
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.current];
  state.answered = false;

  // progress
  const pct = (state.current / state.questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `問題 ${state.current + 1} / ${state.questions.length}`;

  // question
  document.getElementById('question-text').textContent = q.q;

  // options
  const ol = document.getElementById('options-list');
  ol.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${LABELS[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    ol.appendChild(btn);
  });

  // feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  // timer
  clearInterval(state.timerInterval);
  state.timerVal = TIMER_LIMIT[state.difficulty];
  updateTimer();
  state.timerInterval = setInterval(tickTimer, 1000);
}

function tickTimer() {
  state.timerVal--;
  updateTimer();
  if (state.timerVal <= 0) {
    clearInterval(state.timerInterval);
    if (!state.answered) timeOut();
  }
}

function updateTimer() {
  const el = document.getElementById('timer');
  el.textContent = state.timerVal;
  el.className = 'timer-num' + (state.timerVal <= 5 ? ' urgent' : '');
}

function timeOut() {
  state.answered = true;
  const q = state.questions[state.current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
  });
  showFeedback(false, '⏰', '時間切れ！ ' + q.exp);
  document.getElementById('next-btn').style.display = 'flex';
}

function selectAnswer(idx) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);

  const q = state.questions[state.current];
  const isCorrect = idx === q.ans;
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx && !isCorrect) b.classList.add('wrong');
  });

  // score: time bonus
  const PENALTY = { easy: 3, medium: 5, hard: 8 };
  const timeBonus = Math.max(0, state.timerVal);
  const penalty = PENALTY[state.difficulty];

  if (isCorrect) {
    const totalQ = 10 + timeBonus;
    state.correct++;
    state.score += totalQ;
    showFeedback(true, '✅', `正解！ +${totalQ}点（時間ボーナス: +${timeBonus}）\n${q.exp}`);
  } else {
    state.score = Math.max(0, state.score - penalty);
    showFeedback(false, '❌', `不正解。 −${penalty}点ペナルティ。正解は「${q.opts[q.ans]}」\n${q.exp}`);
  }

  document.getElementById('next-btn').style.display = 'flex';
}

function showFeedback(correct, icon, text) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
  document.getElementById('feedback-icon').textContent = icon;
  document.getElementById('feedback-text').textContent = text;
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  state.totalTime = Math.round((Date.now() - state.startTime) / 1000);
  const pct = state.correct / state.questions.length;
  const wrong = state.questions.length - state.correct;

  let emoji, rank, sub;
  if (pct >= 0.9) { emoji = '🏆'; rank = '完璧！天才だ！'; sub = 'パーフェクトに近い成績です'; }
  else if (pct >= 0.7) { emoji = '🎉'; rank = 'すばらしい！'; sub = 'よく勉強していますね'; }
  else if (pct >= 0.5) { emoji = '👏'; rank = 'なかなかです！'; sub = 'もう少しで上位です'; }
  else if (pct >= 0.3) { emoji = '📚'; rank = 'もっと勉強しよう'; sub = '次は頑張れるはず'; }
  else { emoji = '💪'; rank = 'チャレンジ精神！'; sub = '諦めずにまた挑戦！'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('rank-msg').textContent = rank;
  document.getElementById('rank-sub').textContent = sub;
  document.getElementById('score-num').textContent = state.score;
  document.getElementById('correct-count').textContent = state.correct;
  document.getElementById('wrong-count').textContent = wrong;
  document.getElementById('time-count').textContent = state.totalTime;

  generateCoupon();
  showScreen('result-screen');
}

function generateCoupon() {
  const avg = state.totalTime / state.questions.length;
  const diff = state.difficulty;

  // 難易度倍率：高難度ほど少ない正解でも上位ランクに届く
  const MULT = { easy: 1.0, medium: 1.3, hard: 1.7 };
  const couponScore = state.correct * MULT[diff];

  let tier, discount, desc, cls;
  if (couponScore >= 16 && diff === 'hard' && avg <= 9) {
    tier = '🌟 SSランク'; discount = '50% OFF'; desc = 'むずかしい全問正解＋神速クリア！最高クーポン獲得！'; cls = 'coupon coupon-ss';
  } else if (couponScore >= 15) {
    tier = '💜 Sランク';  discount = '40% OFF'; desc = `むずかしい高得点！難易度ボーナス込みで特別クーポン！`; cls = 'coupon coupon-ss';
  } else if (couponScore >= 10) {
    tier = '🥇 Aランク';  discount = '30% OFF'; desc = '素晴らしい成績！難易度ボーナスでお得なクーポン獲得！'; cls = 'coupon coupon-a';
  } else if (couponScore >= 7) {
    tier = '🥈 Bランク';  discount = '20% OFF'; desc = 'よく頑張りました！クーポン獲得！';                cls = 'coupon';
  } else if (couponScore >= 4) {
    tier = '🥉 Cランク';  discount = '10% OFF'; desc = 'あと少し！次はもっと良いクーポンをゲットしよう';  cls = 'coupon';
  } else {
    tier = '🎖 参加賞';   discount = '5% OFF';  desc = '挑戦したあなたへの特別クーポン！';                cls = 'coupon';
  }

  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const seg = () => Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  state.couponCode = `FUKU-${seg()}-${seg()}`;

  const exp = new Date();
  exp.setDate(exp.getDate() + 30);
  const expStr = `${exp.getFullYear()}年${exp.getMonth()+1}月${exp.getDate()}日`;

  document.getElementById('coupon-inner').className = cls;
  document.getElementById('coupon-rank').textContent = tier;
  document.getElementById('coupon-discount').textContent = discount;
  document.getElementById('coupon-desc').textContent = desc;
  document.getElementById('coupon-code').textContent = state.couponCode;
  document.getElementById('coupon-expiry').textContent = `有効期限：${expStr}`;
  document.getElementById('copy-btn').textContent = 'コピー';
}

function copyCoupon() {
  navigator.clipboard.writeText(state.couponCode).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'コピー済✓';
    setTimeout(() => btn.textContent = 'コピー', 2000);
  });
}

function restart() {
  startQuiz();
}

function showStart() {
  clearInterval(state.timerInterval);
  showScreen('start-screen');
}

// init selected state
document.querySelector('[data-category="life"]').classList.add('selected');
</script>
</body>
</html>
